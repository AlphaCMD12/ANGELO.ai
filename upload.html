<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEP 2026 Photo Upload — ANGELO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(ellipse at 30% 20%, rgba(229,182,30,0.08), transparent 60%),
                        radial-gradient(ellipse at 80% 80%, rgba(180,30,30,0.06), transparent 60%),
                        #0f0608;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #f5f5f5;
            padding: 24px;
        }
        .logo {
            width: 72px; height: 72px; border-radius: 50%;
            margin-bottom: 18px;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { filter: drop-shadow(0 0 0 rgba(229,182,30,0)); }
            50%      { filter: drop-shadow(0 0 18px rgba(229,182,30,0.5)); }
        }
        h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; text-align: center; }
        .subtitle { color: rgba(255,255,255,0.45); font-size: 14px; margin-bottom: 36px; text-align: center; max-width: 420px; line-height: 1.5; }

        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 36px 32px;
            width: 100%; max-width: 520px;
            text-align: center;
        }
        .upload-zone {
            border: 2px dashed rgba(229,182,30,0.3);
            border-radius: 14px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.25s;
            margin-bottom: 20px;
        }
        .upload-zone:hover { border-color: rgba(229,182,30,0.7); background: rgba(229,182,30,0.04); }
        .upload-icon { font-size: 52px; margin-bottom: 12px; }
        .upload-zone p { color: rgba(255,255,255,0.4); font-size: 13px; margin-top: 6px; }

        .btn {
            background: linear-gradient(135deg, #e5b61e, #c9991a);
            color: #000;
            border: none;
            padding: 14px 36px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(229,182,30,0.3); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

        .counter {
            margin-top: 24px;
            font-size: 14px;
            color: rgba(255,255,255,0.45);
        }
        .counter strong { color: #e5b61e; font-size: 28px; font-weight: 700; display: block; }

        .toast {
            position: fixed;
            bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #4ade80; color: #000;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700; font-size: 14px;
            transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
            z-index: 99;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .error-box {
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 10px;
            padding: 14px 18px;
            color: #f87171;
            font-size: 14px;
            line-height: 1.5;
            display: none;
            margin-top: 16px;
        }
        .back { display: block; margin-top: 24px; color: rgba(255,255,255,0.3); font-size: 13px; text-decoration: none; transition: color 0.2s; }
        .back:hover { color: #e5b61e; }
    </style>
</head>
<body>
    <img src="logo.png" class="logo" alt="ANGELO" onerror="this.style.display='none'">
    <h1>📸 PEP 2026 Photo Upload</h1>
    <p class="subtitle">For photographers only. Photos you upload will appear instantly in the visitor face-search feature.</p>

    <div class="card">
        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">🗂️</div>
            <p style="font-size:15px; color:#f5f5f5; margin-bottom:4px;">Drag &amp; drop photos here</p>
            <p>Supports JPG, PNG, WEBP • Up to 50 photos at once</p>
        </div>

        <button class="btn" id="openWidget" disabled>Loading upload widget...</button>

        <div class="counter">
            <strong id="count">0</strong>
            photos uploaded this session
        </div>

        <div class="error-box" id="errorBox"></div>
    </div>

    <a href="/" class="back">← Back to ANGELO</a>
    <div class="toast" id="toast">✓ Photo uploaded successfully!</div>

    <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
    <script>
        let uploadedCount = 0;
        let widget = null;

        async function init() {
            let config;
            try {
                const res = await fetch('/api/photo-config');
                config = await res.json();
            } catch(e) {
                showError('Could not connect to server. Is ANGELO running?');
                return;
            }

            if (!config.cloudName) {
                showError('Cloudinary is not configured on the server yet.<br>Add <code>CLOUDINARY_CLOUD_NAME</code>, <code>CLOUDINARY_API_KEY</code>, <code>CLOUDINARY_API_SECRET</code>, and <code>CLOUDINARY_UPLOAD_PRESET</code> to your Render environment variables, then redeploy.');
                return;
            }

            widget = cloudinary.createUploadWidget({
                cloudName:    config.cloudName,
                uploadPreset: config.uploadPreset,
                folder:       'pep2026',
                resourceType: 'image',
                multiple:     true,
                maxFiles:     50,
                clientAllowedFormats: ['jpg', 'jpeg', 'png', 'webp'],
                showUploadMoreButton: true,
                theme: 'minimal'
            }, async (error, result) => {
                if (error) {
                    console.error(error);
                    showError('Upload failed: ' + (error.message || error.statusText || 'Unknown error'));
                    return;
                }
                if (result.event === 'success') {
                    uploadedCount++;
                    document.getElementById('count').textContent = uploadedCount;
                    // Bust server cache so the photo is searchable immediately
                    fetch('/api/photo-uploaded', { method: 'POST' }).catch(() => {});
                    showToast();
                }
            });

            const btn = document.getElementById('openWidget');
            btn.textContent = '📁 Select Photos to Upload';
            btn.disabled = false;
            btn.addEventListener('click', () => widget.open());
            document.getElementById('uploadZone').addEventListener('click', () => widget.open());
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2800);
        }

        function showError(html) {
            const box = document.getElementById('errorBox');
            box.innerHTML = html;
            box.style.display = 'block';
            document.getElementById('openWidget').disabled = true;
            document.getElementById('openWidget').textContent = 'Not Available';
        }

        init();
    </script>
</body>
</html>
